<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Không tìm thấy trang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: #f6f7fc;
      color: #101624;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .error-title {
      font-size: 24px;
      font-weight: 700;
      margin-top: 8px;
      color: #101624;
    }
    .error-desc {
      font-size: 14px;
      color: #7e8494;
      margin-top: 8px;
      max-width: 400px;
      line-height: 1.5;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 24px;
      padding: 12px 28px;
      background: #036ae5;
      color: #fff;
      border: none;
      border-radius: 44px;
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(8,8,8,.2), 0 4px 4px rgba(8,8,8,.08);
      transition: background .2s, transform .15s;
    }
    .back-btn:hover { background: #0352b5; }
    .back-btn:active { transform: scale(.97); }
  </style>
</head>
<body>
  <lottie-player
    src="assets/Bot Error 404.json"
    background="transparent"
    speed="1"
    style="width: 380px; height: 380px;"
    loop
    autoplay>
  </lottie-player>

  <h1 class="error-title">Trang không tồn tại</h1>
  <p class="error-desc">Xin lỗi, trang bạn đang tìm kiếm không tồn tại hoặc đã bị di chuyển.</p>
  <a href="index.html" class="back-btn">← Quay về trang chủ</a>
</body>
</html>
