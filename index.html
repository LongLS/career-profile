<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Career Profile - List Jobs | SotaTek</title>
  <meta name="description" content="Explore career opportunities at SotaTek. Find your perfect job in Engineering & Technology, Back Office, Sales & Marketing, and more." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="career-screen">

    <!-- ===== HEADER ===== -->
    <header class="header">
      <div class="header-logo">
        <img src="assets/65191e22b6830509bad840faa59deeb559bdb3a9.svg" alt="Sotatek Logo" />
      </div>

      <!-- Desktop Nav -->
      <nav class="primary-nav" id="primary-nav">
        <a href="#" class="nav-item active" id="nav-list-jobs">List Jobs</a>
        <a href="#" class="nav-item" id="nav-information">Information</a>
        <a href="#" class="nav-item" id="nav-benefits">Benefits</a>
      </nav>

      <div class="header-actions">
        <button class="btn-primary" id="btn-contact-me">Contact Me</button>
        <!-- Hamburger (mobile/tablet) -->
        <button class="hamburger" id="hamburger-btn" aria-label="Open menu" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <!-- Mobile nav drawer -->
    <div class="mobile-nav-overlay" id="mobile-nav-overlay"></div>
    <nav class="mobile-nav" id="mobile-nav">
      <a href="#" class="mobile-nav-item active">List Jobs</a>
      <a href="#" class="mobile-nav-item">Information</a>
      <a href="#" class="mobile-nav-item">Benefits</a>
    </nav>

    <!-- ===== HERO SECTION ===== -->
    <section class="hero-section">
      <div class="container">
        <div class="recruiter-intro">
          <div class="employers-logo">
            <img src="assets/4af0074298f57b19e796f2e40d367a31d1aa785c.svg" alt="Ms. Nhan Phan" />
          </div>
          <div class="recruiter-info">
            <div class="recruiter-info-top">
              <h1 class="recruiter-name">Ms. Nhan Phan</h1>
              <p class="recruiter-desc">
                Recruitment Specialist<br>
                <strong>5 years</strong> of experience in <strong>talent acquisition</strong><br>
                Connecting talents with the right opportunities
              </p>
            </div>
            <div class="social-links">
              <a href="#" class="social-icon facebook" id="social-facebook" aria-label="Facebook">
                <img src="assets/facebook.svg" alt="Facebook" />
              </a>
              <a href="#" class="social-icon telegram" id="social-telegram" aria-label="Telegram">
                <img src="assets/telegram.svg" alt="Telegram" />
              </a>
              <a href="#" class="social-icon whatsapp" id="social-whatsapp" aria-label="WhatsApp">
                <img src="assets/whatsapp.svg" alt="WhatsApp" />
              </a>
              <a href="#" class="social-icon linkedin" id="social-linkedin" aria-label="LinkedIn">
                <img src="assets/linkedin.svg" alt="LinkedIn" />
              </a>
            </div>
          </div>
        </div>
      </div>

      <div class="hero-visual">
        <img class="hero-artwork" src="assets/Hero Section.svg" alt="Hero Illustration" />
      </div>
    </section>

    <!-- ===== JOBS SECTION ===== -->
    <section class="jobs-section">
      <div class="container">
        <!-- Mobile filter toggle -->
        <button class="filter-toggle-btn" id="filter-toggle-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/>
          </svg>
          Filter
        </button>

        <!-- FILTER SIDEBAR -->
        <aside class="filter-sidebar" id="filter-sidebar">
          <div class="sidebar-header">
            <span class="filter-title">Filter</span>
            <button class="sidebar-close" id="sidebar-close" aria-label="Close filter">✕</button>
          </div>

          <!-- Search input -->
          <div class="search-input-wrap">
            <div class="search-icon-wrap">
              <img src="assets/672a02a5a2fb601b9ec6bb4411d91997465d477a.svg" alt="Search" />
            </div>
            <input type="text" class="search-input" id="search-job-input" placeholder="Enter type of job" />
          </div>

          <div class="filter-divider"></div>

          <!-- Location Filter -->
          <div class="filter-group">
            <h3 class="filter-title">Locations</h3>
            <div class="dropdown" id="location-dropdown">
              <span class="dropdown-text">All Locations</span>
              <img src="assets/7a62725035b11b931adf7e1d17fd23fde6f47ac2.svg" alt="Chevron Down" class="chevron-icon" />
            </div>
          </div>

          <div class="filter-divider"></div>

          <!-- Job Level Filter -->
          <div class="filter-group">
            <h3 class="filter-title">Job Level</h3>
            <div class="checkbox-list">
              <label class="checkbox-item"><input type="checkbox" name="level" value="all"><span class="checkbox-custom"></span>All Level</label>
              <label class="checkbox-item"><input type="checkbox" name="level" value="fresher"><span class="checkbox-custom"></span>Fresher</label>
              <label class="checkbox-item"><input type="checkbox" name="level" value="intern"><span class="checkbox-custom"></span>Intern</label>
              <label class="checkbox-item"><input type="checkbox" name="level" value="junior"><span class="checkbox-custom"></span>Junior</label>
              <label class="checkbox-item"><input type="checkbox" name="level" value="leader"><span class="checkbox-custom"></span>Leader</label>
              <label class="checkbox-item"><input type="checkbox" name="level" value="manager"><span class="checkbox-custom"></span>Manager</label>
              <label class="checkbox-item"><input type="checkbox" name="level" value="middle"><span class="checkbox-custom"></span>Middle</label>
              <label class="checkbox-item"><input type="checkbox" name="level" value="senior"><span class="checkbox-custom"></span>Senior</label>
            </div>
          </div>
        </aside>

        <!-- JOBS GRID -->
        <div class="jobs-grid" id="jobs-grid"></div>
      </div>
    </section>
  </div>

  <script>
    /* ---- Job data ---- */
    const jobs = [
      { title: 'Business Analyst (KR)', level: 'Senior', type: 'Full-Time', salary: '$20,000 - $25,000', company: 'Engineering & Technology', location: 'Hanoi, Vietnam' },
      { title: 'Business Analyst (KR)', level: 'Senior', type: 'Full-Time', salary: '$20,000 - $25,000', company: 'Engineering & Technology', location: 'Hanoi, Vietnam' },
      { title: 'Business Analyst (KR)', level: 'Senior', type: 'Full-Time', salary: '$20,000 - $25,000', company: 'Engineering & Technology', location: 'Hanoi, Vietnam' },
      { title: 'Business Analyst (KR)', level: 'Senior', type: 'Full-Time', salary: '$20,000 - $25,000', company: 'Engineering & Technology', location: 'Hanoi, Vietnam' },
      { title: 'Business Analyst (KR)', level: 'Senior', type: 'Full-Time', salary: '$20,000 - $25,000', company: 'Engineering & Technology', location: 'Hanoi, Vietnam' },
      { title: 'Business Analyst (KR)', level: 'Senior', type: 'Full-Time', salary: '$20,000 - $25,000', company: 'Engineering & Technology', location: 'Hanoi, Vietnam' },
      { title: 'Business Analyst (KR)', level: 'Senior', type: 'Full-Time', salary: '$20,000 - $25,000', company: 'Engineering & Technology', location: 'Hanoi, Vietnam' },
      { title: 'Business Analyst (KR)', level: 'Senior', type: 'Full-Time', salary: '$20,000 - $25,000', company: 'Engineering & Technology', location: 'Hanoi, Vietnam' },
      { title: 'Business Analyst (KR)', level: 'Senior', type: 'Full-Time', salary: '$20,000 - $25,000', company: 'Engineering & Technology', location: 'Hanoi, Vietnam' },
      { title: 'Business Analyst (KR)', level: 'Senior', type: 'Full-Time', salary: '$20,000 - $25,000', company: 'Engineering & Technology', location: 'Hanoi, Vietnam' },
    ];

    document.getElementById('jobs-grid').innerHTML = jobs.map((job, i) => `
      <div class="job-card" id="job-card-${i + 1}">
        <div class="job-heading">
          <div class="job-title-row">
            <h2 class="job-title">${job.title}</h2>
            <span class="badge badge-outline">${job.level}</span>
          </div>
          <div class="job-meta-row">
            <span class="badge badge-success">${job.type}</span>
            <span class="salary-text">Salary: ${job.salary}</span>
          </div>
        </div>
        <div class="job-company">
          <div class="company-logo">
            <img src="assets/7b0da3ea4afe7c04031aa976eeebc9ce4e8c806a.svg" alt="SotaTek" />
          </div>
          <div class="company-info">
            <p class="company-name">${job.company}</p>
            <div class="company-location">
              <img src="assets/a6ec0b2ce9cd7a493539e40b94e2637caf20eb59.svg" alt="Location" class="pin-icon" />
              <span>${job.location}</span>
            </div>
          </div>
        </div>
      </div>
    `).join('');

    /* ---- Hamburger menu ---- */
    const hamburger = document.getElementById('hamburger-btn');
    const mobileNav = document.getElementById('mobile-nav');
    const overlay   = document.getElementById('mobile-nav-overlay');

    function toggleMenu(open) {
      hamburger.classList.toggle('open', open);
      mobileNav.classList.toggle('open', open);
      overlay.classList.toggle('open', open);
      hamburger.setAttribute('aria-expanded', open);
      document.body.style.overflow = open ? 'hidden' : '';
    }

    hamburger.addEventListener('click', () => toggleMenu(!mobileNav.classList.contains('open')));
    overlay.addEventListener('click', () => toggleMenu(false));
    document.querySelectorAll('.mobile-nav-item').forEach(item => {
      item.addEventListener('click', () => toggleMenu(false));
    });

    /* ---- Filter sidebar (mobile) ---- */
    const filterToggle  = document.getElementById('filter-toggle-btn');
    const filterSidebar = document.getElementById('filter-sidebar');
    const sidebarClose  = document.getElementById('sidebar-close');

    filterToggle?.addEventListener('click', () => filterSidebar.classList.add('open'));
    sidebarClose?.addEventListener('click', () => filterSidebar.classList.remove('open'));
  </script>
</body>
</html>
