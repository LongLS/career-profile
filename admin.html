<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Quản lý việc làm | SotaTek</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #036ae5;
      --primary-hover: #0352b5;
      --danger:        #e53935;
      --danger-hover:  #c62828;
      --success:       #47bd5f;
      --gray-1:        #565c69;
      --gray-2:        #7e8494;
      --gray-3:        #bdc0ce;
      --gray-4:        #e5e7ef;
      --gray-5:        #f6f7fc;
      --dark:          #101624;
      --white:         #ffffff;
      --font:          'Be Vietnam Pro', sans-serif;
    }

    body {
      font-family: var(--font);
      background: #eef0f6;
      color: var(--dark);
      min-height: 100vh;
    }

    /* ── Header ── */
    .admin-header {
      background: var(--white);
      border-bottom: 1px solid var(--gray-4);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .admin-header h1 { font-size: 18px; font-weight: 700; color: var(--dark); }
    .admin-header a {
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .admin-header a:hover { text-decoration: underline; }

    /* ── Layout ── */
    .admin-body {
      max-width: 1200px;
      margin: 28px auto;
      padding: 0 24px;
    }

    /* ── Card ── */
    .card {
      background: var(--white);
      border: 1px solid var(--gray-4);
      border-radius: 12px;
      padding: 24px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .card-title-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background .2s, transform .1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary   { background: var(--primary); color: var(--white); }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-secondary { background: var(--gray-5); color: var(--gray-1); border: 1px solid var(--gray-4); }
    .btn-secondary:hover { background: var(--gray-4); }
    .btn-danger    { background: var(--danger); color: var(--white); }
    .btn-danger:hover { background: var(--danger-hover); }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; }

    /* ── Jobs table ── */
    .table-wrap { overflow-x: auto; }
    .jobs-table { width: 100%; border-collapse: collapse; min-width: 700px; }

    .jobs-table th {
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      color: var(--gray-2);
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 10px 12px;
      border-bottom: 2px solid var(--gray-4);
      background: var(--gray-5);
      white-space: nowrap;
    }
    .jobs-table th:first-child { border-radius: 8px 0 0 8px; }
    .jobs-table th:last-child  { border-radius: 0 8px 8px 0; }

    .jobs-table td {
      padding: 14px 12px;
      font-size: 14px;
      border-bottom: 1px solid var(--gray-4);
      vertical-align: middle;
    }
    .jobs-table tr:last-child td { border-bottom: none; }
    .jobs-table tbody tr:hover td { background: #fafbff; }

    /* ── Drag handle ── */
    .drag-handle {
      cursor: grab;
      color: var(--gray-3);
      padding: 14px 8px 14px 12px !important;
      user-select: none;
    }
    .drag-handle:active { cursor: grabbing; }
    .drag-handle:hover { color: var(--gray-2); }
    .drag-handle svg { display: block; }
    .td-stt { color: var(--gray-2); font-weight: 600; }
    .sortable-ghost td  { background: #eef3fd !important; opacity: .55; }
    .sortable-chosen td { background: #f0f4ff !important; }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .badge-outline { border: 1px solid var(--gray-1); color: var(--gray-1); }
    .badge-success { background: #e6f7e4; color: #47bd5f; }
    .badge-warning { background: #fff8e7; color: #f9b217; }

    .td-actions { display: flex; gap: 8px; }

    /* ── Empty / Loading ── */
    .state-msg {
      text-align: center;
      padding: 48px 0;
      color: var(--gray-2);
      font-size: 14px;
    }

    /* ── Form Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--white);
      border-radius: 14px;
      width: 100%;
      max-width: 560px;
      max-height: 90dvh;
      overflow-y: auto;
      box-shadow: 0 12px 48px rgba(0,0,0,.18);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--gray-4);
      position: sticky;
      top: 0;
      background: var(--white);
      border-radius: 14px 14px 0 0;
      z-index: 1;
    }
    .modal-header h3 { font-size: 17px; font-weight: 700; color: var(--dark); }
    .modal-close {
      width: 30px; height: 30px;
      border: none;
      background: var(--gray-5);
      border-radius: 8px;
      font-size: 16px;
      color: var(--gray-1);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .modal-close:hover { background: var(--gray-4); }

    .modal-body { padding: 24px; }

    .modal-footer {
      padding: 16px 24px 20px;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      border-top: 1px solid var(--gray-4);
      background: var(--gray-5);
      border-radius: 0 0 14px 14px;
    }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    label { font-size: 13px; font-weight: 600; color: var(--gray-1); }

    input, select, textarea {
      border: 1px solid var(--gray-3);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: var(--font);
      font-size: 14px;
      color: var(--dark);
      background: var(--white);
      transition: border-color .2s;
      outline: none;
    }
    input, select { height: 42px; padding: 0 12px; }
    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(3,106,229,.08);
    }
    input::placeholder, textarea::placeholder { color: var(--gray-3); }

    textarea {
      min-height: 90px;
      resize: vertical;
      line-height: 1.5;
    }
    .form-hint { font-size: 12px; color: var(--gray-2); font-weight: 400; }

    /* ── Delete confirm modal ── */
    .confirm-modal {
      background: var(--white);
      border-radius: 12px;
      padding: 28px 24px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .confirm-modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .confirm-modal p  { font-size: 14px; color: var(--gray-2); margin-bottom: 24px; }
    .confirm-actions  { display: flex; gap: 12px; justify-content: center; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--dark);
      color: var(--white);
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,.2);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .25s, transform .25s;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show    { opacity: 1; transform: translateY(0); }
    .toast.success { background: var(--success); }
    .toast.error   { background: var(--danger); }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="admin-header">
    <h1>Quản lý việc làm</h1>
    <a href="index.html" target="_blank">← Xem trang chính</a>
  </header>

  <div class="admin-body">
    <div class="card">
      <div class="card-title">
        <div class="card-title-left">
          <span>Danh sách việc làm</span>
          <span id="jobs-count" style="font-size:13px;font-weight:400;color:var(--gray-2)"></span>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn btn-secondary" id="btn-download-template" title="Tải file Excel mẫu">
            📥 Tải template
          </button>
          <button class="btn btn-secondary" id="btn-import-excel" title="Import nhiều việc làm từ file Excel">
            📊 Import Excel
          </button>
          <button class="btn btn-secondary" id="btn-export-excel" title="Xuất toàn bộ việc làm hiện tại ra file Excel">
            📤 Export Excel
          </button>
          <button class="btn btn-primary" id="btn-open-form">
            + Thêm việc làm
          </button>
          <input type="file" id="excel-file-input" accept=".xlsx,.xls,.csv" hidden />
        </div>
      </div>

      <div class="table-wrap" id="table-wrap">
        <p class="state-msg">Đang tải...</p>
      </div>
    </div>
  </div>

  <!-- ===== FORM MODAL ===== -->
  <div class="modal-overlay" id="form-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="form-title">Thêm việc làm mới</h3>
        <button class="modal-close" id="btn-modal-close">✕</button>
      </div>

      <div class="modal-body">
        <form id="job-form" autocomplete="off">
          <input type="hidden" id="edit-id" />
          <div class="form-grid">

            <div class="form-group full">
              <label for="f-title">Tên vị trí *</label>
              <input type="text" id="f-title" placeholder="VD: Business Analyst (KR)" required />
            </div>

            <div class="form-group">
              <label for="f-level">Cấp độ *</label>
              <select id="f-level" required>
                <option value="">-- Chọn --</option>
                <option>Intern</option>
                <option>Fresher</option>
                <option>Junior</option>
                <option>Middle</option>
                <option>Senior</option>
                <option>Leader</option>
                <option>Manager</option>
              </select>
            </div>

            <div class="form-group">
              <label for="f-type">Hình thức *</label>
              <select id="f-type" required>
                <option value="">-- Chọn --</option>
                <option>Full-Time</option>
                <option>Part-Time</option>
              </select>
            </div>

            <div class="form-group">
              <label for="f-salary">Mức lương *</label>
              <input type="text" id="f-salary" placeholder="VD: $1,000 - $2,000" required />
            </div>

            <div class="form-group">
              <label for="f-company">Phòng ban *</label>
              <select id="f-company" required>
                <option value="">-- Chọn phòng ban --</option>
                <option>Back Office</option>
                <option>Engineering &amp; Technology</option>
                <option>Operation Support</option>
                <option>Sales &amp; Marketing</option>
              </select>
            </div>

            <div class="form-group full">
              <label for="f-location">Địa điểm *</label>
              <select id="f-location" required>
                <option value="">-- Chọn địa điểm --</option>
                <option>Hanoi, Vietnam</option>
                <option>Danang, Vietnam</option>
                <option>Hochiminh, Vietnam</option>
              </select>
            </div>

            <div class="form-group full">
              <label for="f-description">
                Job Description
                <span class="form-hint">— Mỗi đoạn văn cách nhau bằng một dòng trống</span>
              </label>
              <textarea id="f-description" rows="5" placeholder="Mô tả công việc..."></textarea>
            </div>

            <div class="form-group full">
              <label for="f-requirements">
                Requirements
                <span class="form-hint">— Mỗi yêu cầu một dòng, sẽ hiển thị dạng bullet list</span>
              </label>
              <textarea id="f-requirements" rows="5" placeholder="3+ years experience&#10;Familiar with Agile&#10;..."></textarea>
            </div>

            <div class="form-group full">
              <label for="f-benefits">
                Benefits
                <span class="form-hint">— Mỗi phúc lợi một dòng</span>
              </label>
              <textarea id="f-benefits" rows="5" placeholder="28 days holiday&#10;Healthcare package&#10;..."></textarea>
            </div>

          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" id="btn-cancel" type="button">Huỷ</button>
        <button class="btn btn-primary" id="btn-submit" type="submit" form="job-form">+ Thêm việc làm</button>
      </div>
    </div>
  </div>

  <!-- ===== DELETE CONFIRM MODAL ===== -->
  <div class="modal-overlay" id="delete-modal">
    <div class="confirm-modal">
      <h3>Xác nhận xoá</h3>
      <p id="delete-msg">Bạn có chắc muốn xoá vị trí này không?</p>
      <div class="confirm-actions">
        <button class="btn btn-secondary" id="modal-cancel">Huỷ</button>
        <button class="btn btn-danger"    id="modal-confirm">Xoá</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <!-- SortableJS -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
  <!-- SheetJS (for Excel import/export) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script>
    /* ── Supabase init ── */
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    /* ── Toast ── */
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    /* ── Render table ── */
    let sortableInstance = null;

    function renderTable(docs) {
      const wrap = document.getElementById('table-wrap');
      document.getElementById('jobs-count').textContent = `(${docs.length} việc làm)`;

      if (!docs.length) {
        wrap.innerHTML = '<p class="state-msg">Chưa có việc làm nào. Nhấn "+ Thêm việc làm" để bắt đầu.</p>';
        return;
      }

      const GRIP = `<svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
        <circle cx="4" cy="3" r="1.3"/><circle cx="10" cy="3" r="1.3"/>
        <circle cx="4" cy="7" r="1.3"/><circle cx="10" cy="7" r="1.3"/>
        <circle cx="4" cy="11" r="1.3"/><circle cx="10" cy="11" r="1.3"/>
      </svg>`;

      const rows = docs.map((j, idx) => {
        const typeClass = j.type === 'Full-Time' ? 'badge-success' : 'badge-warning';
        return `
          <tr data-id="${j.id}">
            <td class="drag-handle" title="Kéo để sắp xếp">${GRIP}</td>
            <td class="td-stt">${idx + 1}</td>
            <td><strong>${j.title}</strong></td>
            <td><span class="badge badge-outline">${j.level}</span></td>
            <td><span class="badge ${typeClass}">${j.type}</span></td>
            <td style="color:var(--gray-2)">${j.salary}</td>
            <td>${j.company}</td>
            <td style="color:var(--gray-2)">${j.location}</td>
            <td>
              <div class="td-actions">
                <button class="btn btn-secondary btn-sm" onclick="startEdit('${j.id}')">Sửa</button>
                <button class="btn btn-danger btn-sm"    onclick="askDelete('${j.id}', '${j.title.replace(/'/g,"\\'")}')">Xoá</button>
              </div>
            </td>
          </tr>`;
      }).join('');

      wrap.innerHTML = `
        <table class="jobs-table">
          <thead>
            <tr>
              <th style="width:36px"></th>
              <th style="width:52px">STT</th>
              <th>Vị trí</th>
              <th>Cấp</th>
              <th>Hình thức</th>
              <th>Lương</th>
              <th>Phòng ban</th>
              <th>Địa điểm</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody id="jobs-tbody">${rows}</tbody>
        </table>`;

      if (sortableInstance) sortableInstance.destroy();
      sortableInstance = Sortable.create(document.getElementById('jobs-tbody'), {
        handle: '.drag-handle',
        animation: 150,
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        onEnd: handleReorder,
      });
    }

    /* ── Load jobs ── */
    let allDocs = [];
    let isReordering = false;

    async function loadJobs() {
      const { data, error } = await db
        .from('jobs')
        .select('*')
        .order('display_order', { ascending: true });

      if (error) {
        console.error('[Supabase]', error);
        document.getElementById('table-wrap').innerHTML =
          `<p class="state-msg" style="color:#e53935">Lỗi: ${error.message}</p>`;
        return;
      }
      allDocs = data;
      renderTable(data);
    }

    /* ── Test connection ── */
    async function testConnection() {
      const { data, error } = await db.from('jobs').select('count').limit(1);
      if (error) {
        document.getElementById('table-wrap').innerHTML =
          `<p class="state-msg" style="color:#e53935">
            ❌ Lỗi kết nối Supabase<br>
            <strong>${error.code}</strong>: ${error.message}
          </p>`;
      } else {
        loadJobs();
      }
    }
    testConnection();

    /* ── Real-time ── */
    db.channel('admin-jobs')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'jobs' },
        () => { if (!isReordering) loadJobs(); })
      .subscribe();

    /* ── Handle reorder ── */
    async function handleReorder() {
      const tbody = document.getElementById('jobs-tbody');
      if (!tbody) return;
      const rows = [...tbody.querySelectorAll('tr[data-id]')];
      rows.forEach((row, i) => { row.querySelector('.td-stt').textContent = i + 1; });

      isReordering = true;
      try {
        await Promise.all(rows.map((row, i) =>
          db.from('jobs').update({ display_order: i + 1 }).eq('id', row.dataset.id)
        ));
        showToast('Đã cập nhật thứ tự hiển thị!');
        allDocs = rows.map(row => allDocs.find(d => d.id === row.dataset.id));
      } catch (err) {
        showToast('Lỗi khi cập nhật thứ tự', 'error');
        loadJobs();
      } finally {
        isReordering = false;
      }
    }

    /* ── Form modal ── */
    const formModal  = document.getElementById('form-modal');
    const formTitle  = document.getElementById('form-title');
    const btnSubmit  = document.getElementById('btn-submit');
    const editIdEl   = document.getElementById('edit-id');

    function openFormModal(isEdit = false) {
      formTitle.textContent = isEdit ? 'Chỉnh sửa việc làm' : 'Thêm việc làm mới';
      btnSubmit.textContent = isEdit ? 'Lưu thay đổi' : '+ Thêm việc làm';
      formModal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeFormModal() {
      formModal.classList.remove('open');
      document.body.style.overflow = '';
      resetForm();
    }

    document.getElementById('btn-open-form').addEventListener('click', () => openFormModal(false));
    document.getElementById('btn-modal-close').addEventListener('click', closeFormModal);
    document.getElementById('btn-cancel').addEventListener('click', closeFormModal);

    // Close on overlay click
    formModal.addEventListener('click', (e) => {
      if (e.target === formModal) closeFormModal();
    });

    /* ── Form submit ── */
    document.getElementById('job-form').addEventListener('submit', async e => {
      e.preventDefault();
      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Đang lưu...';

      const data = {
        title:        document.getElementById('f-title').value.trim(),
        level:        document.getElementById('f-level').value,
        type:         document.getElementById('f-type').value,
        salary:       document.getElementById('f-salary').value.trim(),
        company:      document.getElementById('f-company').value.trim(),
        location:     document.getElementById('f-location').value.trim(),
        description:  document.getElementById('f-description').value.trim(),
        requirements: document.getElementById('f-requirements').value.trim(),
        benefits:     document.getElementById('f-benefits').value.trim(),
      };

      try {
        const id = editIdEl.value;
        if (id) {
          const { error } = await db.from('jobs').update(data).eq('id', id);
          if (error) throw error;
          showToast('Cập nhật thành công!');
        } else {
          const maxOrder = allDocs.length ? Math.max(...allDocs.map(d => d.display_order || 0)) : 0;
          const { error } = await db.from('jobs').insert({ ...data, display_order: maxOrder + 1 });
          if (error) throw error;
          showToast('Thêm việc làm thành công!');
        }
        closeFormModal();
        loadJobs();
      } catch (err) {
        console.error(err);
        showToast('Lỗi: ' + err.message, 'error');
        btnSubmit.disabled = false;
        btnSubmit.textContent = editIdEl.value ? 'Lưu thay đổi' : '+ Thêm việc làm';
      }
    });

    /* ── Edit ── */
    function startEdit(id) {
      const j = allDocs.find(d => d.id === id);
      if (!j) return;
      editIdEl.value = id;
      document.getElementById('f-title').value        = j.title;
      document.getElementById('f-level').value        = j.level;
      document.getElementById('f-type').value         = j.type;
      document.getElementById('f-salary').value       = j.salary;
      document.getElementById('f-company').value      = j.company;
      document.getElementById('f-location').value     = j.location;
      document.getElementById('f-description').value  = j.description  || '';
      document.getElementById('f-requirements').value = j.requirements || '';
      document.getElementById('f-benefits').value     = j.benefits     || '';
      openFormModal(true);
    }

    function resetForm() {
      document.getElementById('job-form').reset();
      editIdEl.value         = '';
      btnSubmit.disabled     = false;
    }

    /* ── Delete ── */
    let pendingDeleteId = '';
    const deleteModal   = document.getElementById('delete-modal');

    function askDelete(id, title) {
      pendingDeleteId = id;
      document.getElementById('delete-msg').textContent =
        `Bạn có chắc muốn xoá vị trí "${title}"? Hành động này không thể hoàn tác.`;
      deleteModal.classList.add('open');
    }

    document.getElementById('modal-cancel').addEventListener('click',  () => deleteModal.classList.remove('open'));
    document.getElementById('modal-confirm').addEventListener('click', async () => {
      deleteModal.classList.remove('open');
      const { error } = await db.from('jobs').delete().eq('id', pendingDeleteId);
      if (error) {
        showToast('Lỗi khi xoá: ' + error.message, 'error');
      } else {
        showToast('Đã xoá việc làm.');
        loadJobs();
      }
      pendingDeleteId = '';
    });

    /* ================================================
       EXCEL IMPORT / TEMPLATE DOWNLOAD
       ================================================ */
    const JOB_COLUMNS = ['title', 'level', 'type', 'salary', 'company', 'location',
                         'description', 'requirements', 'benefits'];
    const REQUIRED_COLUMNS = ['title', 'level', 'type', 'salary', 'company', 'location'];

    /* ── Download template ── */
    document.getElementById('btn-download-template').addEventListener('click', () => {
      const sampleRows = [
        {
          title: 'Business Analyst (KR)',
          level: 'Senior',
          type: 'Full-Time',
          salary: 'Negotiable',
          company: 'Engineering & Technology',
          location: 'Hanoi, Vietnam',
          description: 'Short job description here...',
          requirements: 'Requirement 1\nRequirement 2\nRequirement 3',
          benefits: 'Benefit 1\nBenefit 2\nBenefit 3',
        },
      ];
      const ws = XLSX.utils.json_to_sheet(sampleRows, { header: JOB_COLUMNS });
      // Set column widths for readability
      ws['!cols'] = JOB_COLUMNS.map(() => ({ wch: 24 }));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Jobs');
      XLSX.writeFile(wb, 'jobs-template.xlsx');
    });

    /* ── Export all jobs to Excel ── */
    document.getElementById('btn-export-excel').addEventListener('click', () => {
      if (!allDocs.length) {
        showToast('Chưa có việc làm nào để xuất.', 'error');
        return;
      }

      // Pick only the fields we want (in the same order as the template)
      const rows = allDocs.map(job => {
        const row = {};
        JOB_COLUMNS.forEach(col => { row[col] = job[col] ?? ''; });
        return row;
      });

      const ws = XLSX.utils.json_to_sheet(rows, { header: JOB_COLUMNS });
      ws['!cols'] = JOB_COLUMNS.map(() => ({ wch: 24 }));

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Jobs');

      const ts = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
      XLSX.writeFile(wb, `jobs-export-${ts}.xlsx`);

      showToast(`Đã xuất ${rows.length} việc làm.`);
    });

    /* ── Import Excel ── */
    const excelInput = document.getElementById('excel-file-input');
    document.getElementById('btn-import-excel').addEventListener('click', () => excelInput.click());

    excelInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      // Reset so user can pick the same file again later
      excelInput.value = '';

      try {
        const buf = await file.arrayBuffer();
        const wb  = XLSX.read(buf, { type: 'array' });
        const ws  = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

        if (!rows.length) {
          showToast('File rỗng, không có dữ liệu để import.', 'error');
          return;
        }

        // Validate & normalise rows
        const valid = [];
        const errors = [];
        rows.forEach((row, i) => {
          const cleaned = {};
          JOB_COLUMNS.forEach(col => {
            cleaned[col] = (row[col] ?? '').toString().trim();
          });
          const missing = REQUIRED_COLUMNS.filter(c => !cleaned[c]);
          if (missing.length) {
            errors.push(`Dòng ${i + 2}: thiếu ${missing.join(', ')}`);
          } else {
            valid.push(cleaned);
          }
        });

        if (!valid.length) {
          showToast(`Không có dòng hợp lệ. ${errors.length} dòng lỗi.`, 'error');
          console.warn('[Import errors]', errors);
          return;
        }

        const msg = `Sẽ import ${valid.length} việc làm` +
                    (errors.length ? ` (${errors.length} dòng lỗi sẽ bỏ qua — xem Console để chi tiết)` : '') +
                    '.\n\nTiếp tục?';
        if (!confirm(msg)) return;
        if (errors.length) console.warn('[Import errors]', errors);

        // Assign display_order continuing from current max
        const startOrder = allDocs.length ? Math.max(...allDocs.map(d => d.display_order || 0)) : 0;
        const payload = valid.map((row, i) => ({ ...row, display_order: startOrder + i + 1 }));

        isReordering = true; // avoid real-time reload storm during batch insert
        const { error } = await db.from('jobs').insert(payload);
        isReordering = false;

        if (error) throw error;
        showToast(`Đã import ${valid.length} việc làm!`);
        loadJobs();
      } catch (err) {
        console.error(err);
        isReordering = false;
        showToast('Lỗi import: ' + err.message, 'error');
      }
    });
  </script>
</body>
</html>
